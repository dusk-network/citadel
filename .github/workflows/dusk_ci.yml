on:
  pull_request:
  push:
    branches:
      - main

name: CI

jobs:
  code_analysis:
    name: Code Analysis
    uses: dusk-network/.github/.github/workflows/code-analysis.yml@main

  dusk_analyzer:
    name: Dusk Analyzer
    uses: dusk-network/.github/.github/workflows/dusk-analysis.yml@main

  build_benches:
    name: Build Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --no-run --features zk

  test_std:
    name: Stable toolchain tests
    runs-on: core
    steps:
      - uses: actions/checkout@v4
      - uses: dsherret/rust-toolchain-file@v1
      - run: cargo build --release --features zk
      - run: rustup target add wasm32-unknown-unknown
      - run: cd contract && cargo build --target wasm32-unknown-unknown --release
      - run: cargo test --release --features zk

  test_no_std:
    name: Stable toolchain no_std tests
    runs-on: core
    steps:
      - uses: actions/checkout@v4
      - uses: dsherret/rust-toolchain-file@v1
      - run: cargo build --release --no-default-features --features zk
      - run: rustup target add wasm32-unknown-unknown
      - run: cd contract && cargo build --target wasm32-unknown-unknown --release
      - run: cargo test --release --no-default-features --features zk
